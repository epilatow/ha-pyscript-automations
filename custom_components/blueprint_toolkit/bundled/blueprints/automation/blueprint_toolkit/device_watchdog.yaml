blueprint:
  name: Device Watchdog
  description: >
    Monitor device health across integrations. Raises a
    persistent notification whenever monitored devices have
    unavailable entities or stop reporting state within
    the configured window. Clears notifications
    automatically when devices recover.
    [Full documentation](/local/blueprint_toolkit/docs/device_watchdog.html).
  domain: automation
  author: epilatow

  input:
    enabled_checks:
      name: Enabled checks
      description: >
        Which health checks to run. Select any subset;
        an empty selection means all checks. Instantiate
        multiple automations with different subsets and
        exclusion lists to scope exclusions per check.
          - unavailable-entities: flag entities in the
            unavailable/unknown state.
          - device-updates: flag devices whose entities
            have not reported state within the dead-device
            threshold.
          - disabled-diagnostics: flag devices whose
            recommended diagnostic entities (e.g., Last
            seen, Node status) are disabled.
      default: []
      selector:
        select:
          multiple: true
          options:
            - unavailable-entities
            - device-updates
            - disabled-diagnostics

    include_integrations:
      name: Include integrations
      description: >
        Integrations to monitor. Leave empty to monitor
        all integrations.
      default: []
      selector:
        select:
          multiple: true
          custom_value: true
          options: []

    exclude_integrations:
      name: Exclude integrations
      description: >
        Integrations to skip even if they match the
        include list.
      default: []
      selector:
        select:
          multiple: true
          custom_value: true
          options: []

    device_exclude_regex:
      name: Device exclude regex
      description: >
        Devices whose name matches any of these regular
        expressions are ignored. Enter one pattern per
        line. A partial match is sufficient (use ^...$
        to require a full match).
      default: ""
      selector:
        text:
          multiline: true

    entity_id_exclude_regex:
      name: Entity ID exclude regex
      description: >
        Entities whose ID matches any of these regular
        expressions are ignored. Enter one pattern per
        line. A partial match is sufficient (use ^...$
        to require a full match).
      default: ""
      selector:
        text:
          multiline: true

    monitored_entity_domains:
      name: Monitored entity domains
      description: >
        Only applies to the unavailable-entities and
        device-updates checks. Domain names (e.g., sensor,
        binary_sensor) that count toward device health.
        Leave empty to include all domains.
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - sensor
            - binary_sensor
            - device_tracker
      default:
        - sensor
        - binary_sensor
        - device_tracker

    check_interval_minutes:
      name: Check interval (minutes)
      description: Minutes between watchdog evaluations.
      default: 60
      selector:
        number:
          min: 1
          max: 10080
          unit_of_measurement: minutes
          mode: box

    dead_device_threshold_minutes:
      name: Dead device threshold (minutes)
      description: >
        Only applies to the device-updates check. If no
        entity associated with the device reports state
        within this many minutes the device is considered
        offline.
      default: 1440
      selector:
        number:
          min: 1
          max: 10080
          unit_of_measurement: minutes
          mode: box

    max_device_notifications:
      name: Max device notifications
      description: >
        Maximum number of per-device notifications.
        Set to 0 for unlimited. When the cap is reached,
        a summary notification indicates how many
        additional notifications were suppressed.
      default: 0
      selector:
        number:
          min: 0
          max: 1000
          mode: box

    debug_logging:
      name: Debug Logging
      description: >
        Enable debug logging. When enabled, emits a
        log.warning message with full decision context
        on every invocation. Check Settings > System >
        Logs to view output.
      default: false
      selector:
        boolean: {}

triggers: []

actions:
  - action: blueprint_toolkit.device_watchdog
    # Periodic scheduling lives in the integration handler
    # (``schedule_periodic_with_jitter``); the blueprint
    # has no triggers of its own. Manual UI runs land here
    # with ``trigger`` undefined, which collapses to
    # ``"manual"``; integration-fired ticks pass
    # ``trigger_id: "periodic"`` as a flat top-level
    # variable (HA's automation.trigger service clobbers
    # ``variables.trigger`` with ``{"platform": None}`` so
    # ``trigger.*`` overrides are silently dropped -- pass
    # flat keys instead).
    data:
      instance_id: "{{ this.entity_id }}"
      trigger_id: "{{ trigger_id | default('manual', true) }}"
      include_integrations_raw: !input include_integrations
      exclude_integrations_raw: !input exclude_integrations
      device_exclude_regex_raw: !input device_exclude_regex
      entity_id_exclude_regex_raw: !input entity_id_exclude_regex
      monitored_entity_domains_raw: !input monitored_entity_domains
      check_interval_minutes_raw: !input check_interval_minutes
      dead_device_threshold_minutes_raw: !input dead_device_threshold_minutes
      enabled_checks_raw: !input enabled_checks
      max_device_notifications_raw: !input max_device_notifications
      debug_logging_raw: !input debug_logging

# A single in-flight scan at a time per instance: if a
# manual trigger arrives while a periodic tick is still
# evaluating, drop it.
mode: single
