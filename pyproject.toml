[project]
name = "ha-pyscript-automations"
version = "1.0.0"
description = "Home Assistant automations with testable PyScript actions"
requires-python = ">=3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 80
target-version = "py311"
cache-dir = "/tmp/ruff_cache"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["pyscript/"]
mypy_path = ["pyscript/modules"]
cache_dir = "/tmp/mypy_cache"

[[tool.mypy.overrides]]
module = ["homeassistant.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["ha_pyscript_automations"]
disallow_untyped_defs = false
disallow_untyped_calls = false
