<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F6FA"/>
      <stop offset="55%" stop-color="#D6DBE4"/>
      <stop offset="100%" stop-color="#A7AEBC"/>
    </linearGradient>
    <linearGradient id="chromeSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8A92A3" stop-opacity="0.5"/>
      <stop offset="15%" stop-color="#8A92A3" stop-opacity="0"/>
      <stop offset="85%" stop-color="#8A92A3" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8A92A3" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="toast" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4CE7A"/>
      <stop offset="100%" stop-color="#D9A24A"/>
    </linearGradient>
    <linearGradient id="knobFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0B6C2"/>
      <stop offset="50%" stop-color="#E4E7EE"/>
      <stop offset="100%" stop-color="#B0B6C2"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="240" cy="482" rx="200" ry="14" fill="#1E2128" opacity="0.18"/>

  <!-- Toast -->
  <g transform="translate(96 70) rotate(-6 140 95)">
    <path d="M 8 44 Q 16 12 52 6 Q 140 -2 228 6 Q 264 12 272 44 L 272 180 L 8 180 Z"
          fill="#8A5A28" stroke="#4A2E10" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 22 52 Q 30 22 58 18 Q 140 12 222 18 Q 250 22 258 52 L 258 176 L 22 176 Z"
          fill="url(#toast)"/>
    <ellipse cx="62" cy="82" rx="14" ry="6" fill="#C9912F" opacity="0.3"/>
    <ellipse cx="148" cy="68" rx="10" ry="5" fill="#C9912F" opacity="0.35"/>
    <ellipse cx="210" cy="92" rx="12" ry="6" fill="#C9912F" opacity="0.3"/>
    <ellipse cx="94" cy="124" rx="16" ry="7" fill="#C9912F" opacity="0.28"/>
    <ellipse cx="190" cy="132" rx="10" ry="5" fill="#C9912F" opacity="0.3"/>
  </g>

  <!-- Body -->
  <rect x="48" y="158" width="372" height="302" rx="40" ry="40"
        fill="url(#chrome)" stroke="#2A2E38" stroke-width="7" stroke-linejoin="round"/>
  <rect x="48" y="158" width="372" height="302" rx="40" ry="40" fill="url(#chromeSide)"/>

  <!-- Slider (top) -->
  <rect x="420" y="212" width="24" height="22" rx="6"
        fill="#E85A3D" stroke="#2A2E38" stroke-width="3" stroke-linejoin="round"/>
  <rect x="425" y="216" width="14" height="2.5" rx="1.25" fill="#FFFFFF" opacity="0.5"/>

  <!-- Dial -->
  <rect x="420" y="354" width="28" height="52" rx="8"
        fill="#2A2E38" stroke="#1E2128" stroke-width="2" stroke-linejoin="round"/>
  <rect x="424" y="358" width="22" height="44" rx="6" fill="url(#knobFace)"/>
  <line x1="427" y1="368" x2="443" y2="368" stroke="#6A7080" stroke-width="1.2"/>
  <line x1="427" y1="374" x2="443" y2="374" stroke="#6A7080" stroke-width="1.2"/>
  <line x1="427" y1="380" x2="443" y2="380" stroke="#6A7080" stroke-width="1.2"/>
  <line x1="427" y1="386" x2="443" y2="386" stroke="#6A7080" stroke-width="1.2"/>
  <line x1="427" y1="392" x2="443" y2="392" stroke="#6A7080" stroke-width="1.2"/>

  <!-- Face: deadpan expression (variant E) -->
  <!-- Eye whites -->
  <circle cx="168" cy="273" r="44" fill="#FFFFFF" stroke="#2A2E38" stroke-width="6"/>
  <circle cx="298" cy="273" r="44" fill="#FFFFFF" stroke="#2A2E38" stroke-width="6"/>
  <!-- Pupils (looking up-right) -->
  <circle cx="180" cy="270" r="19" fill="#1E2128"/>
  <circle cx="310" cy="270" r="19" fill="#1E2128"/>
  <!-- Shines -->
  <circle cx="188" cy="263" r="7" fill="#FFFFFF"/>
  <circle cx="318" cy="263" r="7" fill="#FFFFFF"/>
  <circle cx="172" cy="282" r="3" fill="#FFFFFF"/>
  <circle cx="302" cy="282" r="3" fill="#FFFFFF"/>
  <!-- Mouth: nearly flat with tiny slant -->
  <path d="M 204 366 Q 234 370 266 372" stroke="#2A2E38" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cheeks -->
  <ellipse cx="96" cy="325" rx="16" ry="9" fill="#FF9AB0" opacity="0.55"/>
  <ellipse cx="370" cy="325" rx="16" ry="9" fill="#FF9AB0" opacity="0.55"/>

  <!-- Feet -->
  <rect x="78" y="454" width="52" height="16" rx="6" fill="#2A2E38"/>
  <rect x="338" y="454" width="52" height="16" rx="6" fill="#2A2E38"/>
</svg>
